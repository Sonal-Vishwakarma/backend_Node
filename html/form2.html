<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Cartoon Form</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(135deg,#141e30,#243b55);
      overflow:hidden;
    }

    /* Background Animation */

    .bubble{
      position:absolute;
      border-radius:50%;
      background:rgba(255,255,255,0.1);
      animation: float 8s infinite ease-in-out;
    }

    .bubble:nth-child(1){
      width:180px;
      height:180px;
      top:50px;
      left:80px;
    }

    .bubble:nth-child(2){
      width:120px;
      height:120px;
      bottom:100px;
      right:100px;
      animation-delay:2s;
    }

    .bubble:nth-child(3){
      width:80px;
      height:80px;
      top:250px;
      right:250px;
      animation-delay:1s;
    }

    @keyframes float{
      0%{
        transform:translateY(0px);
      }
      50%{
        transform:translateY(-30px);
      }
      100%{
        transform:translateY(0px);
      }
    }

    /* Main Card */

    .container{
      width:900px;
      height:550px;
      display:flex;
      background:rgba(255,255,255,0.08);
      border-radius:30px;
      backdrop-filter:blur(15px);
      overflow:hidden;
      box-shadow:0 15px 40px rgba(0,0,0,0.4);
      animation: popup 1s ease;
      z-index:10;
    }

    @keyframes popup{
      from{
        transform:scale(0.7);
        opacity:0;
      }
      to{
        transform:scale(1);
        opacity:1;
      }
    }

    /* Left Side Cartoon */

    .left{
      width:45%;
      background:linear-gradient(135deg,#4facfe,#00f2fe);
      display:flex;
      justify-content:center;
      align-items:center;
      flex-direction:column;
      padding:30px;
      color:white;
      position:relative;
    }

    .left img{
      width:280px;
      animation:bounce 3s infinite;
    }

    @keyframes bounce{
      0%,100%{
        transform:translateY(0);
      }
      50%{
        transform:translateY(-20px);
      }
    }

    .left h1{
      margin-top:20px;
      font-size:35px;
    }

    .left p{
      margin-top:10px;
      text-align:center;
      line-height:25px;
    }

    /* Right Side Form */

    .right{
      width:55%;
      padding:50px;
      display:flex;
      flex-direction:column;
      justify-content:center;
    }

    .right h2{
      color:white;
      margin-bottom:30px;
      text-align:center;
      font-size:32px;
    }

    .input-box{
      margin-bottom:20px;
    }

    .input-box input,
    .input-box textarea{
      width:100%;
      padding:15px;
      border:none;
      border-radius:12px;
      outline:none;
      font-size:16px;
      background:rgba(255,255,255,0.9);
    }

    .input-box textarea{
      resize:none;
      height:90px;
    }

    .input-box input:focus,
    .input-box textarea:focus{
      box-shadow:0 0 10px #4facfe;
    }

    button{
      padding:15px;
      border:none;
      border-radius:12px;
      background:linear-gradient(135deg,#4facfe,#00f2fe);
      color:white;
      font-size:18px;
      cursor:pointer;
      transition:0.3s;
      font-weight:bold;
    }

    button:hover{
      transform:scale(1.04);
    }

  </style>

</head>
<body>

  <!-- Animated Background -->

  <div class="bubble"></div>
  <div class="bubble"></div>
  <div class="bubble"></div>

  <!-- Main Container -->

  <div class="container">

    <!-- Cartoon Side -->

    <div class="left">

      <img src="https://cdn-icons-png.flaticon.com/512/4712/4712109.png" alt="cartoon">

      <h1>Hello Friend 👋</h1>

      <p>
        Fill this beautiful animated form<br>
        and connect with us today.
      </p>

    </div>

    <!-- Form Side -->

    <div class="right">

      <h2>Contact Form</h2>

      <form action="/submit" method="POST">

        <div class="input-box">
          <input 
            type="text"
            name="name"
            placeholder="Enter your name"
            required
          >
        </div>

        <div class="input-box">
          <input 
            type="email"
            name="email"
            placeholder="Enter your email"
            required
          >
        </div>

        <div class="input-box">
          <input 
            type="number"
            name="phone"
            placeholder="Enter your phone number"
          >
        </div>

        <div class="input-box">
          <input 
            type="text"
            name="city"
            placeholder="Enter your city"
          >
        </div>

        <div class="input-box">
          <textarea 
            name="message"
            placeholder="Write your message..."
          ></textarea>
        </div>

        <button type="submit">Submit Now 🚀</button>

      </form>

    </div>

  </div>

</body>
</html>
